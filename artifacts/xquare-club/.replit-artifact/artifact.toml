kind = "web"
previewPath = "/"
title = "XQUARE CLUB"
version = "1.0.0"
id = "artifacts/xquare-club"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19359
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/xquare-club run dev"

[services.env]
PORT = "19359"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/xquare-club", "run", "build"]
publicDir = "artifacts/xquare-club/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
